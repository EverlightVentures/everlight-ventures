  replenishment_floor: 0.92
  flip_bonus: 1
  spoof_penalty: 2
  spoof_risk_threshold: 0.65

# BTC correlation: penalize trades that fight BTC momentum
btc_correlation:
  enabled: true
  lookback_bars: 8              # 8 × 15m = 2 hours of BTC momentum
  strong_move_pct: 0.005        # 0.5% BTC move = "strong"
  bonus_pts: 5                  # +5 score when BTC confirms direction
  penalty_pts: 5                # -5 score when BTC contradicts

# Candlestick pattern detection: engulfing, hammer, star, pin bar, doji
candle_patterns:
  enabled: true
  bonus_pts: 5                  # +5 score when pattern confirms direction
  penalty_pts: 3                # -3 score when pattern contradicts

# Sentiment gate -- block toxic trades during extreme fear/panic
# Uses Crypto Fear & Greed Index (alternative.me, free, no auth)
sentiment_gate:
  enabled: true
  block_all_below: 10         # F&G < 10 = catastrophic panic, block ALL entries
  block_longs_below: 20       # F&G < 20 = extreme fear, block longs (shorts ok)
  reduce_size_below: 30       # F&G < 30 = fear, reduce position size
  fear_size_mult: 0.5         # half size when in fear zone

# Slack alerts
slack:
  bot_token: "${SLACK_BOT_TOKEN}"
  client_secret: "${SLACK_CLIENT_SECRET}"
  signing_secret: "${SLACK_SIGNING_SECRET}"
  war_room_enabled: true
  hive_dashboard_url: ""
  # Live feed reports (replaces dashboard)
  reports:
    pulse_interval_min: 15       # regime, vol, gates, direction bias
    health_interval_min: 60      # balances, margin, PnL, equity
    position_interval_min: 5     # unrealized PnL updates while in trade

# Claude AI trade intelligence advisor
ai:
  enabled: true
  model: opus
  pre_entry_enabled: true           # fire entry eval before placing orders
  exit_advisor_enabled: true        # fire exit eval while in trade
  regime_advisor_enabled: true      # fire regime eval on vol transitions
  skip_confidence_threshold: 0.55   # AI needs >= 55% confidence to skip entry (was 70% — too strict)
  max_score_adjustment: 10          # max points AI can add/subtract from score
  exit_tighten_on_exit_now: false   # was true -- stale AI cache causes premature decay exits
  cache_ttl_entry: 0                # always fresh for entries (0 = no expiry)
  cache_ttl_exit: 120               # recheck exit every 2 min
  cache_ttl_regime: 300             # recheck regime every 5 min
  # Executive mode: Claude makes the actual entry/exit decisions
  executive_mode: true              # Claude is the boss — overrides strategy engine
  executive_full_control: false     # advisory-only by default; deterministic risk and freshness gates stay binding
  executive_min_confidence: 0.60    # lowered for overnight sprint — Opus needs to fire fast
  executive_allow_soft_risk_override: false
  executive_allow_no_signal_entries: false
  executive_allow_size_override: false
  executive_allow_gemini_takeover: false
  cache_ttl_directive: 60           # 60 sec — fastest reaction time when the breakout comes
  hard_min_score: 40                # ABSOLUTE floor — nothing below this trades, period
  # Codex peer advisor (team mode): Codex analyzes in parallel, Opus stays boss.
  codex:
    enabled: true                   # safe default: keep off until you confirm Codex login/profile
    cli_bin: codex                  # Codex CLI binary
    model: gpt-5                    # Codex model for peer analysis
    sandbox_mode: read-only         # prevents Codex exec from writing files
    timeout_sec: 60
    pre_entry_enabled: true
    exit_advisor_enabled: true
    regime_advisor_enabled: true
    executive_mode: true            # produce codex_directive in parallel with Claude directive
    cache_ttl_entry: 0
    cache_ttl_exit: 120
    cache_ttl_regime: 300
    cache_ttl_directive: 60
  # Gemini peer advisor (team member)
  gemini:
    enabled: true
    model: gemini-1.5-pro-latest
    pre_entry_enabled: true
    exit_advisor_enabled: true
    regime_advisor_enabled: true
    executive_mode: true
    cache_ttl_entry: 0
    cache_ttl_exit: 120
    cache_ttl_regime: 300
    cache_ttl_directive: 60
  # Inter-agent communication (live debate + consensus)
  agent_comms:
    enabled: true
    challenge_round: true          # agents challenge each other's positions
    consensus_required: false      # if true, requires 2/3 agreement to enter
    exit_challenge_threshold: 0.70 # confidence needed for exit challenge
    max_debate_time_sec: 30        # timeout for challenge round
    log_debates: true              # log all debates to agent_debates.jsonl
  # Perplexity News Sentinel (Intel)
  perplexity:
    enabled: true
    # API Key loaded from .env or PERPLEXITY_API_KEY env var
    # Fallback: uses Claude 'WebSearch' tool if no key found

# Macro/market informer stream for dashboard + Slack digest.
market_intel:
  enabled: true
  refresh_seconds: 300
  timeout_sec: 3.5
  binance_symbol: XLMUSDT
  max_headlines: 24
  slack_digest_enabled: true
  slack_interval_minutes: 60
  slack_max_items: 5
  futures_relativity:
    bonus_max: 4
    min_confidence: 0.45
  weekly_research:
    enabled: true
    refresh_hours: 6
    window_refresh_hours: 2
    sunday_start_hour_et: 18
    monday_end_hour_et: 10
    score_bonus_max: 3
    min_confidence: 0.45
  liquidation_feed:
    symbol: XLMUSDT
    stale_seconds: 45
    window_seconds: 900
    reconnect_seconds: 3
    recent_event_limit: 200
    min_notional_5m_usd: 25000
    bonus_max: 2

logging:
  decisions_jsonl: logs/decisions.jsonl
  trades_csv: logs/trades.csv

paths:
  data_dir: data
  logs_dir: logs

# Regime-based trading: adapt risk/exit params to market conditions
# Uses vol_phase from expansion.py + ADX from v4_engine — no new indicators
regime_manager:
  enabled: true
  compression:
    adx_threshold: 25         # ADX below this = choppy
    rsi_low: 40               # RSI must be in this range for compression
    rsi_high: 60
    size_multiplier: 0.7      # 30% smaller positions in chop
    max_sl_pct: 0.025         # 2.5% max stop
    tp_atr_mult: 1.0          # quick scalps: 1.0x ATR
    time_stop_bars: 8         # was 3 -- 2hr time stop (45min too aggressive for fees)
    early_save_bars: 8        # was 3 -- let SL handle risk, not early save
  expansion:
    adx_threshold: 25         # ADX above this = trending
    atr_ratio_threshold: 1.15 # OR ATR ratio above this
    size_multiplier: 1.3      # 30% bigger in trends
    max_sl_pct: 0.03          # standard 3% stop
    tp_atr_mult: 2.0          # LET WINNERS RUN in expansion
    time_stop_bars: 24        # was 12 -- 6 hours for trend trades to develop
    early_save_bars: 10       # was 8 -- don't cut winners early in trends
  # Default thresholds for transition mode (uses base config values)
  default_max_sl_pct: 0.04
  default_tp_atr_mult: 1.0
  default_time_stop_bars: 10    # was 6 -- 2.5hr default
  default_early_save_bars: 8   # was 6

# Fib Retrace Engine: countertrend entries at fib retracement levels
fib_retrace:
  enabled: true
  min_swing_pct: 0.03
  lookback_bars_1h: 48
  swing_left: 3
  swing_right: 3
  retrace_depth_max: 0.35
  min_confirmations: 2
  min_rr_ratio: 1.5
  sl_atr_buffer_mult: 0.3

# Slow Bleed Hunter — catches gradual directional grinds
slow_bleed_hunter:
  enabled: true
  min_consecutive_bars: 3       # 3+ lower-highs + lower-lows (or inverse)
  ema_period: 20                # EMA-20 for direction confirmation
  rsi_min: 30                   # RSI floor (avoid oversold bounces)
  rsi_max: 65                   # RSI ceiling (avoid overbought fades)
  volume_min_ratio: 0.8         # volume >= 80% of 10-bar avg (alive but not spiking)
  body_consistency_max: 2.5     # max body size ratio (bleed = steady, not wild)
  min_confirmations: 2          # need 2+ confluence beyond consecutive bars

# HTF Trend Bias Filter
# When the 1h trend is clearly bearish (crash), block new longs unless the
# entry type is a confirmed capitulation reversal signal.
# Symmetric logic applies to shorts in a bullish expansion.
# Uses classify_htf_trend_bias() from strategy/regime_manager.py.
htf_direction_filter:
  enabled: true

  # bearish_crash: RSI_1h < 30 + price below EMA21 + EMA21 below EMA55 + slope negative
  # In this state, ONLY these entry types are allowed for longs:
  capitulation_entry_types:
    - reversal_impulse       # strong reversal candle + structure
    - wick_rejection         # long wick off support with volume
    - volume_climax_reversal # climactic selling exhaustion
    - fib_retrace            # bounce from measured fib level

  # Asymmetric sizing applied on top of all other multipliers.
  # bearish_crash: longs get 0.4x (minimal), shorts get 1.2x (full conviction)
  # bearish_trend: longs get 0.7x (cautious), shorts get 1.1x (slight edge)
  # neutral: 1.0x both directions
  # bullish_trend: longs 1.1x, shorts 0.7x
  # bullish_expansion: longs 1.2x, shorts 0.4x (only reversals allowed)
  # (These are baked into classify_htf_trend_bias() return values.
  #  Set enabled: false to disable the filter and revert to symmetric sizing.)

# Rolling expectancy gate: kill switch when bot is running cold
rolling_expectancy:
  enabled: true
  lookback: 20                    # rolling window of last 20 closed trades
  min_trades: 10                  # don't activate until 10+ trades exist
  min_win_rate: 0.25              # block below 25% win rate
  reduce_win_rate: 0.35           # reduce size below 35% win rate
  reduce_size_mult: 0.5           # half size when in warning zone
  min_ev_usd: -3.0                # block when avg trade loses more than $3
  min_profit_factor: 0.5          # block when profit factor below 0.5
  max_tail_losses: 5              # block after 5 consecutive losses at tail
  promotion_min_size_mult: 1.15   # only promote size when realized edge is materially strong
  promotion_cap: 1.5              # never let expectancy promotion outrun the rest of the caps
  reduction_floor: 0.25           # keep some floor for size reductions before a hard kill-switch

# Market pulse: composite health scoring (fuses sentiment + news + live tick)
market_pulse:
  enabled: true
  cache_ttl_sec: 300              # recompute every 5 min
  danger_block_entries: true      # danger regime is now a hard stop for new entries
  danger_threshold: 20            # health < 20 = danger zone
  risk_off_size_mult: 0.7         # 30% smaller positions in risk_off
  notify_regime_change: true      # Slack alert on regime transitions

freshness_gates:
  enabled: true
  max_live_tick_age_sec: 60
  max_market_brief_age_min: 45
  block_on_dead_tick: true
  block_on_stale_market_brief: true
  block_on_sentiment_stale_in_danger: true
  block_on_pulse_danger: true
