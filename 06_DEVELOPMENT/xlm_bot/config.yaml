# XLM PERP Confluence Engine v1
symbol: XLM-PERP
product_id: XLP-20DEC30-CDE
leverage: 4
paper: false
signal_product_id: XLP-20DEC30-CDE
data_product_id: XLM-USD
timezone: America/Los_Angeles
selector:
  prefer_perp: true
  min_volume_24h: 0
  min_open_interest: 1
  roll_days: 7

data:
  history_days_15m: 45
  max_candle_age_min: 45   # block new entries if most recent 15m candle is older than this

session_filter:
  enabled: false               # crypto trades 24/7 but bot already has margin windows
  # UTC windows (for reference if enabled)
  # 9:30-11:00 AM ET = 13:30-15:00 UTC = highest volume window
  windows:
    - start: "13:30"
      end: "15:00"
    - start: "18:00"
      end: "21:00"

risk:
  max_trades_per_day: 2            # SNIPER MODE: only 2 trades/day -- the absolute best setups only
  max_losses_per_day: 1            # SNIPER MODE: 1 loss = done. Preserve capital, wait for tomorrow.
  cooldown_minutes: 60             # SNIPER MODE: 60min cooldown between trades -- patience is the edge
  cooldown_loss_threshold: 1       # AUDIT FIX: was 999, cooldown after 1 loss
  revenge_cooldown_minutes: 120    # SNIPER MODE: 2hr revenge cooldown -- no emotional re-entries
  daily_profit_target_usd: 0       # uncapped
  loss_cooldown_requires_new_structure: true  # AUDIT FIX: require new structure after loss
  capital_allocation_pct: 1.0
  max_sl_pct: 0.00               # DISABLED: smart_exit.py handles exits based on chart structure, not dumb percentages. $10 emergency floor prevents exchange force-close.
  max_daily_loss_pct: 0.02       # SNIPER MODE: 2% daily cap = ~$10. Max 1 stopped trade + fees.
  sl_atr_buffer_mult: 0.5
  max_risk_pct_per_trade: 0.05   # TIGHTENED: 5% max risk per trade. Was 15% -- way too aggressive for a $525 account.
  smoke_check_stop_pct: 0.0025   # 0.25% preview stop for non-live bracket smoke checks
  # Tier-based R:R — weaker signals need better reward to compensate
  min_rr_ratio:
    MONSTER: 2.5                # SNIPER MODE: even best setups need 2.5:1 -- wide targets, tight stops
    SCALP: 3.5                  # SNIPER MODE: scalps need 3.5:1 to justify the fee drag
    REDUCED: 3.0                # SNIPER MODE: 3:1 minimum on reduced conviction
    FULL: 3.0                   # SNIPER MODE: 3:1 across the board
    default: 3.0                # SNIPER MODE: global floor raised to 3:1 -- only asymmetric bets

risk_profile:
  risk_pct: 0.15
  target_pct: 0.05              # 5% base TP target - aim for real moves, not crumbs

# Dynamic position sizing — compound growth engine
position_sizing:
  enabled: true
  mode: equity_pct          # equity_pct = % of current equity (compounds naturally)
  base_risk_pct: 0.03       # PHASE 1: conservative 3% while proving the system
  max_risk_pct: 0.08        # 8% max risk per trade
  min_contracts: 1           # PHASE 1: start with 1 contract, EARN the right to size up
  max_contracts: auto        # AUTO COMPOUND: floor(equity / equity_per_contract) — grows with every win
  equity_per_contract: 180   # default — overridden by margin window sizing below
  max_contracts_hard_cap: 2  # SNIPER MODE: 2 contracts. $0.003 move = $60. Stop at 0.2% = $6.28. R:R = 10:1.
  # Margin-window-aware sizing: conservative until bot proves itself
  margin_window_sizing:
    enabled: true
    intraday_equity_per_contract: 150   # at $306 equity = 2 contracts max, safe sizing
    overnight_equity_per_contract: 200  # 1-2 contracts overnight only
    pre_cutoff_equity_per_contract: 200 # conservative near cutoff

  # Compression regime override: cut size when vol is dead
  compression_override:
    enabled: true
    max_contracts: 1        # 1 contract max during compression -- no sizing up in dead vol
    size_multiplier: 0.5    # half normal size -- smaller bets in tighter ranges

  # Lane risk budgets (multiplier on base_risk_pct)
  # Higher = safer strategies get bigger positions
  lane_budgets:
    A: 1.0    # trend following — proven, full budget
    B: 0.9    # breakout — slightly riskier
    C: 0.7    # sweep — counter-trend, smaller
    E: 0.8    # squeeze — moderate risk
    F: 0.7    # compression breakout — volatile
    G: 0.6    # range scalp — tight range, small moves
    H: 0.9    # trend structure — high conviction structure breaks
    I: 0.7    # fib retrace — countertrend, conservative sizing
    J: 0.5    # slow bleed — micro-scalps, conservative sizing

    K: 0.7    # wick rejection - counter-trend, conservative
    M: 0.6    # volume climax - high risk reversal
    N: 0.8    # VWAP reversion - statistical edge
    P: 0.6    # grid range - range-edge mean reversion, conservative sizing
    Q: 0.7    # funding arb - directional bias from funding, moderate sizing
    R: 0.6    # regime low vol - squeeze scalps, conservative sizing
    S: 0.6    # stat arb proxy - z-score mean reversion, conservative sizing
    T: 0.8    # orderflow imbalance - volume delta is strong edge
    U: 0.9    # macro MA cross - rare but high conviction regime shift
    V: 1.0    # liquidity sweep - full conviction when 4-of-6 confluence fires
    W: 1.0    # ORB - opening range breakout, high conviction session play
    X: 0.9    # hourly continuation - 1h candle direction + 15m momentum shift

  # Quality tier multipliers on position size
  tier_multipliers:
    MONSTER: 1.5    # exceptional — go big on the best setups
    FULL: 1.25      # full conviction — bigger than default
    REDUCED: 0.75   # less conviction, smaller size
    SCALP: 0.50     # low conviction, half size

  # Multi-contract unlock: FULL quality + expansion regime can go to 2 contracts
  # when equity covers margin for both contracts with buffer
  multi_contract:
    enabled: true
    min_quality: MONSTER        # only unlock extra contracts on MONSTER tier setups
    require_expansion: true     # only in expansion regime (trending/breakout)
    max_contracts_unlock: 2     # PHASE 1: max 2 contracts even on best setups
    margin_buffer_pct: 0.10     # 10% buffer (was 20% — tighter to maximize size)

  # Streak adjustment (anti-martingale: grow on wins, shrink on losses)
  streak:
    enabled: true
    win_streak_bonus: 0.10    # +10% size per consecutive win (max 3 wins = +30%)
    win_streak_max: 3         # cap bonus at 3 wins
    loss_streak_cut: 0.25     # -25% size per consecutive loss
    loss_streak_max: 2        # cap cut at 2 losses (= -50%)

  # Account tier scaling — COMPOUND MODE: stay aggressive as account grows
  account_tiers:
    - max_equity: 500
      risk_mult: 1.3     # aggressive under $500 — need to build fast
    - max_equity: 1000
      risk_mult: 1.2     # still aggressive $500-$1000 — compounding phase
    - max_equity: 2000
      risk_mult: 1.1     # keep pushing $1000-$2000 — reinvest gains
    - max_equity: 5000
      risk_mult: 1.0     # standard above $2000 — account is working
    - max_equity: 99999
      risk_mult: 0.85    # slight pullback above $5000 — protect the bag

  # Explicit bot growth ladder: compound first, income extraction later.
  growth_ladder:
    enabled: true
    stages:
      - label: BUILD_A
        max_equity: 750
        max_contracts: 1
        base_risk_pct: 0.025
        max_risk_pct: 0.04
        daily_target_usd: 25
        daily_stop_usd: 20
        per_trade_risk_usd: 10
        withdrawal_mode: compound
      - label: BUILD_B
        max_equity: 1500
        max_contracts: 2
        base_risk_pct: 0.03
        max_risk_pct: 0.05
        daily_target_usd: 40
        daily_stop_usd: 30
        per_trade_risk_usd: 18
        withdrawal_mode: compound
      - label: BUILD_C
        max_equity: 3000
        max_contracts: 3
        base_risk_pct: 0.03
        max_risk_pct: 0.06
        daily_target_usd: 75
        daily_stop_usd: 45
        per_trade_risk_usd: 30
        withdrawal_mode: compound
      - label: BUILD_D
        max_equity: 5000
        max_contracts: 5
        base_risk_pct: 0.025
        max_risk_pct: 0.05
        daily_target_usd: 125
        daily_stop_usd: 60
        per_trade_risk_usd: 45
        withdrawal_mode: compound
      - label: INCOME
        max_equity: 99999
        max_contracts: 5
        base_risk_pct: 0.02
        max_risk_pct: 0.04
        daily_target_usd: 150
        daily_stop_usd: 75
        per_trade_risk_usd: 50
        withdrawal_mode: siphon_excess
  readiness:
    contract_buffer_pct: 0.10
    two_contract_buffer_pct: 0.10

exits:
  attach_exchange_tp: false       # was true -- exchange TP causes phantom churn via reconciler
  pending_fill_expiry_sec: 90     # if an entry fill is still unverified after this, force review/cleanup
  early_save_adverse_pct: 0.00     # SNIPER MODE: DISABLED -- let the hard stop do its job
  early_save_bars: 999             # SNIPER MODE: DISABLED -- never early-save, hold until TP or stop
  time_stop_bars: 999             # DISABLED: time is NOT a reason to exit. Only TP, SL, or structure break.
  time_stop_min_move_pct: -1.0    # DISABLED: never time-stop a trade. Let it breathe.
  # Entry-type-specific time_stop overrides (reversals need more time to develop)
  # Mar 21 fix: reversal shorts were getting time-stopped before the move happened
  entry_type_time_stop:
    reversal_impulse:
      time_stop_bars: 999            # DISABLED: hold until TP or SL. Time is irrelevant.
      time_stop_min_move_pct: -1.0    # DISABLED
    fib_retrace:
      time_stop_bars: 999            # DISABLED
      time_stop_min_move_pct: -1.0
    volume_climax_reversal:
      time_stop_bars: 999            # DISABLED
      time_stop_min_move_pct: -1.0
    wick_rejection:
      time_stop_bars: 999            # DISABLED
      time_stop_min_move_pct: -1.0
  tp1_move: 0.40                  # SNIPER MODE: was 0.15 -- wide first target, aim for real swing move
  tp2_move: 0.70                  # SNIPER MODE: was 0.30 -- let the swing develop
  tp3_move: 1.20                  # SNIPER MODE: was 0.60 -- full swing target for 10-17hr holds
  # Compression-specific TP overrides: tighter targets for low-vol scalps
  compression_override:
    tp1_mult: 0.15          # was 0.40 -- compression moves are tiny, grab what you can
    tp2_mult: 0.30          # was 0.70 -- mid-range target in compression
    tp3_mult: 0.50          # was 1.20 -- full compression range is the max target
    decay_threshold: 0.20   # was 0.40 -- faster decay detection in low vol
    min_profit_usd: 1.00    # was 2.00 -- accept smaller wins during compression
  tp_full_close_if_single_contract: true
  breakeven_atr_trigger: 2.5       # RAISED: was 1.0 -- 1 ATR arms too fast in choppy downtrends, causes repeated BE exits + worse re-entries. Need 2.5 ATR real move before arming.
  breakeven_buffer_pct: 0.004     # keep: buffer covers ~$1.50 in fees at $0.15 XLM
  min_tp_pct: 0.005           # SNIPER MODE: was 0.003 -- minimum 0.5% TP = ~$2.50 at $500. No crumb hunting.

regime_gates:
  atr_multiplier: 0.45
  distance_from_value_atr_mult: 2.5
  distance_from_value_breakout_mult: 5.0   # wider gate when 1h ATR is expanding (breakout)
  spread_max_pct: 0.0025
  gate_routing: true

# Volatility regime gate: block entries during unfavorable vol phases
regime:
  compression_gate: true       # Block ALL new entries during COMPRESSION vol state
  allowed_phases:
    - IGNITION
    - EXPANSION
  blocked_phases:
    - COMPRESSION
    - EXHAUSTION
  compression_range_override: true  # Allow compression_range strategy even in COMPRESSION

# Compression range micro-strategy: scalp the range when vol is dead
compression_range:
  enabled: true
  max_contracts: 1
  tp_atr_mult: 0.15             # tiny TP: 0.15 ATR
  sl_atr_mult: 0.10             # tight SL: 0.10 ATR beyond range edge
  max_trades_per_range: 3       # max 3 trades per detected range
  min_range_width_atr: 0.20     # range must be at least 0.20 ATR wide
  max_range_width_atr: 1.0      # range must be less than 1.0 ATR wide
  buy_zone_pct: 0.25            # buy in bottom 25% of range
  sell_zone_pct: 0.25           # sell in top 25% of range
  cooldown_after_loss_minutes: 30
  min_rr: 1.5                   # minimum R:R for compression scalps

futures_funding:
  enforce: true
  buffer_pct: 0.02
  reserve_usd: 10
  auto_transfer: true
  currency: USDC
  preferred_currencies: [USDC]
  conversion_cost_bps: 0           # USDC→USDC = no conversion
  monitor_currencies: [USD, USDC]
  balance_delta_alert_usd: 0.5
  profit_split_pct: 1.0            # sweep ALL profit back to spot USDC
  min_transfer_usd: 5
  spot_reserve_floor_usd: 5
  max_transfer_per_day_usd: 2000
  # Idle sweep: move derivatives balance → spot USDC when not in a trade
  idle_sweep:
    enabled: true
    min_sweep_usd: 5               # don't sweep less than $5
  rescue:
    enabled: true
    trigger_pct: 0.02
    reserve_multiple: 1.0

# Balance reconciliation — auto-correct wallet drift (spot vs derivatives)
balance_reconciliation:
  enabled: true
  buffer_usdc: 2.0                 # keep $2 in derivatives for settlement
  sweep_threshold_usdc: 5.0        # don't bother sweeping less than $5
  auto_convert_usd: false          # DISABLED: account is USDC-only, conversion API not supported
  require_all_usdc: true           # block entries if non-USDC detected -- USDC only account
  max_transfer_retries: 3
  safe_mode_cooldown_minutes: 15
  log_every_cycle: false           # true = log even when no drift (verbose)

# Coinbase-style margin ratio guard (cross margin). Defaults are conservative and only block NEW entries.
margin_policy:
  enabled: true
  enforcement: smart      # smart = block only when margin actually unsafe
  # Coinbase CDE: intraday 8AM-4PM ET (5AM-1PM PT) = 8 hours lower margin
  # Overnight: 4PM-8AM ET (1PM-5AM PT) = 16 hours higher margin
  cutoff_hour_et: 16       # 4:00 PM ET = 1:00 PM PT — overnight margin kicks in
  cutoff_minute_et: 0
  intraday_start_hour_et: 8   # 8:00 AM ET = 5:00 AM PT — intraday margin resumes
  intraday_start_minute_et: 0
  pre_cutoff_minutes: 15   # stop new entries 15 min before cutoff (12:45 PM PT)
  safe_lt: 0.85           # restored: block entries above 85% MR
  warning_lt: 0.92
  danger_lt: 0.995
  liquidation_gte: 1.00
  # Overnight auto-enable: when equity covers overnight margin with buffer, allow 24/7 trading
  overnight_trading:
    mode: auto             # auto = enable when equity sufficient, always = force on, never = force off
    min_equity_ratio: 1.05 # need equity >= 1.05x overnight margin (e.g., $432*1.05 = $454)
    overnight_safe_mr: 0.85  # max overnight MR to allow entries during overnight hours
  friday_break:
    enabled: true
    break_weekday: 4
    break_start_hour_et: 17
    break_start_minute_et: 0
    break_end_hour_et: 18
    break_end_minute_et: 0
    pre_break_new_entry_lock_minutes: 60
    force_flat_minutes_before_break: 20
    reopen_cooldown_minutes: 0              # NO COOLDOWN
  playbook:
    enabled: true
    intraday:
      label: INTRADAY_ATTACK
      objective: press_A_plus_setups_and_close_before_cutoff
      allow_multi_contract: true
      max_new_contracts: 2
      min_quality_for_multi_contract: FULL
      force_exit_before_cutoff: true
    pre_cutoff:
      label: PRE_CUTOFF_DEFENSE
      objective: no_new_risk_manage_existing_position_and_be_flat_before_overnight
      block_new_entries: true
      max_new_contracts: 1
      force_exit_before_cutoff: true
    overnight:
      label: OVERNIGHT_DEFENSE
      objective: preserve_capital_trade_small_only_if_overnight_margin_is_safe
      block_new_entries_if_not_safe: true
      block_new_entries_when_safe: false
      allow_multi_contract_when_safe: false
      max_new_contracts_when_safe: 1
      max_new_contracts_when_unsafe: 1

# Pre-Liquidation Rescue Ladder (PLRL-3): DISABLED per war room audit.
# War room verdict: Martingale logic (averaging down on leverage) is retail behavior.
# Dynamic % stops + circuit breakers now force exit BEFORE liquidation.
# Emergency margin sweep kept as last-resort safety net only.
plrl3:
  enabled: false                # SNIPER MODE: DISABLED. No averaging down. 1 contract, 1 stop, done.
  enforcement: active           # active enforcement -- actually add contracts
  max_rescues: 2                # max 2 add-ons (3 contracts total max)
  liq_trigger_pct: 0.08         # start rescue at 8% toward liquidation
  mr_triggers: [0.55, 0.70]    # add at 55% and 70% margin ratio
  add_multipliers: [1, 1]      # add 1 contract each time (conservative)
  strict_initial_sizing: true
  mr_max_allowed: 0.85         # SAFETY: never let margin ratio exceed 85%
  fail_mr: 0.88                # SAFETY: abort rescue if MR would exceed 88%
  max_projected_mr: 0.85       # SAFETY: project MR before adding
  overnight_guard_mr: 0.80     # SAFETY: tighter guard overnight
  disable_rescues_pre_cutoff_min: 30
  # Emergency margin sweep still active -- sweeps spot USDC to prevent liquidation
  aggressive_sweep: true

# Strategy Engine v4 controls
v4:
  regime_mode: mr_only   # SNIPER MODE: mean reversion ONLY. Data says 95% of XLM big moves are S/R bounces/rejections.
  strict_score_gate: true
  quality_tiers:
    enabled: true
    reduced_gap: 3               # SNIPER MODE: razor-thin gap -- almost nothing qualifies as reduced
    scalp_gap: 8                 # SNIPER MODE: raise scalp bar -- we want FULL+ tier only
    monster_above: 25            # SNIPER MODE: only the top 1% setups get MONSTER
    reduced:
      breakeven_atr_trigger: 3.0      # RAISED: was 1.5 -- reduced-quality trades need MORE room, not less
      time_stop_bars: 999             # DISABLED: no time exits
      time_stop_min_move_pct: -1.0
    scalp:
      breakeven_atr_trigger: 2.0      # RAISED: was 1.0 -- scalps still need room to breathe through pullbacks
      time_stop_bars: 999             # DISABLED: no time exits even on scalps
      time_stop_min_move_pct: -1.0
      use_min_tp: true
  entry_idempotency_sec: 90
  exit:
    dynamic_tp_enabled: true
    trend_tp_atr: 3.50            # SNIPER MODE: wider trend TP (won't fire in mr_only but kept for safety)
    mr_tp_atr: 3.00              # SNIPER MODE: 3x ATR targets -- data says big moves are 10-17hr swings, need wide nets
    reversal_min_bars: 48         # SNIPER MODE: 12 hours minimum before any reversal signal exit. Hold the trade.
    reversal_requires_nonpositive_pnl: true   # KEEP: only exit on reversal when in profit
    reversal_min_hold_minutes: 720  # SNIPER MODE: 12 hour minimum hold. Data says swings last 10-17 hours.
  reverse_on_exit:
    enabled: false                   # SNIPER MODE: DISABLED. No auto-reversals. Each trade is a deliberate sniper shot.
    # ONLY reverse after WINNING exits. Never flip after a loss -- that is revenge trading.
    allowed_exit_reasons: [tp1, profit_lock, min_profit_floor, runner_trail_stop, runner_floor_hit, moonshot_trail_stop]
    require_opposite_direction: true
    require_profitable_exit: true    # CRITICAL FIX: only flip after WINS. Flipping after losses was the #2 killer.
    ignore_cooldown: false           # CRITICAL FIX: respect cooldown after losses. Was true -- caused revenge trades.
  profit_lock:
    enabled: true
    # LOOSENED 2026-03-19: give trades room to breathe, stop choking winners
    activate_usd: 6.00              # SNIPER MODE: was $4 -- arm at $6, let swing develop before locking
    keep_ratio: 0.40               # SNIPER MODE: was 0.50 -- keep 40% of peak, more room for swing pullbacks
    max_giveback_usd: 5.00         # SNIPER MODE: was $3 -- allow $5 giveback for 10-17hr holds
    min_bars_since_entry: 1
    lock_min_usd: 0.50
    tiers:
      SCALP:
        activate_usd: 4.00            # let scalps run to real profit before locking
        keep_ratio: 0.50              # keep 50% of peak, give room
        max_giveback_usd: 3.00        # stop choking trades on $0.75 pullbacks
      REDUCED:
        activate_usd: 5.00
        keep_ratio: 0.50
        max_giveback_usd: 4.00
      FULL:
        activate_usd: 6.00            # lock only after $6 profit
        keep_ratio: 0.45
        max_giveback_usd: 5.00
      FULL_expansion:
        activate_usd: 8.00            # expansion = let it ride
        keep_ratio: 0.40
        max_giveback_usd: 6.00
      MONSTER:
        activate_usd: 8.00
        keep_ratio: 0.40
        max_giveback_usd: 6.00
      MONSTER_expansion:
        activate_usd: 10.00           # monster in expansion = max room to run
        keep_ratio: 0.35
        max_giveback_usd: 8.00
  # Profit Protection Lanes — layered defense against giving back open profit
  profit_protection:
    # Lane 1: Hard minimum floor — once up this much, NEVER give it all back.
    # Independent of profit_lock tiers. Fires before profit_lock activates.
    min_floor:
      enabled: true
      floor_usd: 5.00          # don't lock until $5 real profit
      min_bars: 4              # 1 hour minimum before floor activates
      trail_pct: 0.40          # trail at 40% of peak, give room
    # Compression Scalp: faster profit capture when vol is low.
    # Overrides min_floor + decay_arm to grab small profits quickly.
    compression_scalp:
      min_floor_usd: 4.00      # no locking crumbs, wait for real profit
      min_bars: 4              # 1 hour before arming any exit
      decay_arm_usd: 5.00      # match decay_exit arm level
      exempt_regimes: [trend]  # trend entries use wider entry_profile values, not scalp
    # Lane 2: Momentum-confirmed decay exit — close when profit peaks and momentum dies.
    # Only arms after unrealized exceeds arm_usd. Exits when retrace % exceeded AND momentum weak.
    decay_exit:
      enabled: true
      arm_usd: 5.00            # widened: was 3.00 -- don't even think about decay until $5 profit
      decay_pct: 0.65           # widened: was 0.50 -- need 65% retrace, not 50%
      require_momentum: true   # re-enabled: require RSI/MACD weakness to confirm exit
      # Strategy-specific decay thresholds
      strategy_overrides:
        trend:
          decay_pct: 0.75       # widened: was 0.65 -- trends retrace 50%+ normally
        mean_reversion:
          decay_pct: 0.65       # widened: was 0.45 -- MR needs room to work
        compression_range:
          decay_pct: 0.60       # widened: was 0.50 -- compression needs patience
    # Strategy-specific profit profiles — different entries have different expectations.
    # tp_mult scales the base TP targets. min_profit_usd overrides the global floor.
    # decay_pct overrides the decay exit threshold for that strategy combo.
    entry_profiles:
      # Quick scalps: small targets, tight protection, fast exits
      # min_profit_usd is POST-FEE — fees already subtracted from PnL tracking
      compression_range:
        tp_mult: 0.40
        min_profit_usd: 2.00
        decay_pct: 0.25
      early_impulse:
        tp_mult: 0.50
        min_profit_usd: 2.00
        decay_pct: 0.30
      # Standard entries: moderate expectations
      # min_profit_usd is POST-FEE — fees already subtracted from PnL tracking
      pullback:
        tp_mult: 0.70
        min_profit_usd: 2.00
        decay_pct: 0.35
      reversal_impulse:
        tp_mult: 0.70
        min_profit_usd: 2.00
        decay_pct: 0.35
      # Liquidity sweep entries: snapback is fast, capture the bounce
      liquidity_sweep:
        tp_mult: 0.4
        min_profit_usd: 2.00
        decay_pct: 0.40
      liquidity_sweep_continuation:
        tp_mult: 0.70
        min_profit_usd: 2.00
        decay_pct: 0.32
      liquidity_sweep_reversal:
        tp_mult: 0.55
        min_profit_usd: 2.00
        decay_pct: 0.24
      # Trend entries: wide targets, patient holds, bigger expected wins
      breakout_retest:
        tp_mult: 0.5
        min_profit_usd: 2.00
        decay_pct: 0.40
      compression_breakout:
        tp_mult: 0.5
        min_profit_usd: 2.00
        decay_pct: 0.40
      # Regime+entry combos (checked first — more specific = higher priority)
      pullback_trend:
        tp_mult: 0.6
        min_profit_usd: 2.00
        decay_pct: 0.45
      breakout_retest_trend:
