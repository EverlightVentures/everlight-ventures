      J:
        EMA_ALIGN_SLOPE: 25
        ADX_TREND: 20
        MACD_MOMENTUM: 15
        VWAP_CONFIRM: 15
        VOLUME_SPIKE: 10
        BB_EXPAND_OR_WALK: 10
        HTF_BREAK: 10
