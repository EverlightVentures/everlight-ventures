        MACD_DIVERGENCE: 10
        RSI_DIVERGENCE: 10
        OBV_DIVERGENCE: 8
        HTF_LEVEL: 10
        DOUBLE_PATTERN: 12
        CUP_HANDLE: 10

      # Lane J: Slow Bleed Hunter — weights for gradual directional grinds
