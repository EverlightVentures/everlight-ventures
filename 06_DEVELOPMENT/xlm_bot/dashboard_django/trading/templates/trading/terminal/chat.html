{% load trading_tags %}

<div class="intel-card" style="padding:16px;margin-top:8px;">
  <div class="claude-header">
    <span class="claude-logo"><i class="fa-solid fa-brain"></i></span>
    <div>
      <div class="claude-title">Claude Chat</div>
      <div class="claude-sub">Embedded assistant -- ask about the bot, market, or strategy</div>
    </div>
  </div>

  <iframe
    src="{{ XLM_CHAT_URL|default:'http://127.0.0.1:8504/launch/' }}"
    style="width:100%;height:600px;border:1px solid rgba(255,255,255,0.06);border-radius:12px;background:#0a0a0f;"
    allow="clipboard-write"
    loading="lazy">
  </iframe>
</div>
