# Everlight Hive Mind tmux Configuration
# Optimized for Samsung Z Fold / Termux

# 1. Performance
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5

# 2. UI & Interaction
set -g mouse on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
setw -g aggressive-resize on

# 3. Pane Styling (Synergy Visuals)
set -g status-bg black
set -g status-fg cyan
set -g pane-border-style fg=white
set -g pane-active-border-style fg=cyan

# 4. Status Bar
set -g status-left "[#S] "
set -g status-right " #[fg=white]%H:%M #[fg=cyan]Hive Mind Active "
