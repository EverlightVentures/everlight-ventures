  lane_scoring:
    enabled: true
    sweep_lookback: 3
    sweep_reclaim_pct: 0.002
    lane_a_threshold: 55
    lane_a_mr_threshold: 55
    lane_b_threshold: 50
    lane_b_atr_bypass: true
    lane_c_threshold: 45
    lane_c_require_sweep_or_ri: true
    lane_c_atr_bypass: true
    lane_e_threshold: 50
    lane_e_distance_bypass: true
    lane_f_threshold: 40
    lane_f_distance_bypass: true
    lane_g_threshold: 40
    lane_g_enabled: true
    lane_h_threshold: 45
    lane_h_enabled: true
    lane_i_threshold: 45
    lane_i_enabled: true
    lane_j_threshold: 35
    lane_j_enabled: true
    # New lanes (Phase 3: self-learning playbook expansion)
    lane_k_threshold: 50
    lane_k_enabled: true
    lane_l_enabled: true           # MTF conflict blocker (prevents entries, not an entry lane)
    lane_l_mtf_rsi_gap: 20        # block when 15m vs 1h RSI gap > 20
    lane_m_threshold: 55
    lane_m_enabled: true
