        VOLUME_SPIKE: 15
        BB_EXPAND_OR_WALK: 10
        HTF_BREAK: 10
        VWAP_CONFIRM: 10
        FLAG_CONTINUATION: 10
        CHANNEL_BREAKOUT: 10

      I:
        FIB_ZONE: 20
        RSI_EXTREME: 20
        BB_REJECTION: 15
