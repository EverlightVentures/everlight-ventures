btc_correlation:
  enabled: true
  lookback_bars: 8              # 8 × 15m = 2 hours of BTC momentum
  strong_move_pct: 0.005        # 0.5% BTC move = "strong"
  bonus_pts: 5                  # +5 score when BTC confirms direction
  penalty_pts: 5                # -5 score when BTC contradicts

# Candlestick pattern detection: engulfing, hammer, star, pin bar, doji
candle_patterns:
  enabled: true
  bonus_pts: 12                 # +12 score when pattern confirms direction
  penalty_pts: 8                # -8 score when pattern contradicts
  level_bonus_pts: 8            # +8 bonus when pattern forms at key level
  level_penalty_extra: 5        # +5 extra penalty when pattern contradicts at key level

# Sentiment gate -- block toxic trades during extreme fear/panic
# Uses Crypto Fear & Greed Index (alternative.me, free, no auth)
sentiment_gate:
  enabled: true
  block_all_below: 10         # F&G < 10 = catastrophic panic, block ALL entries
  block_longs_below: 20       # F&G < 20 = extreme fear, block longs (shorts ok)
  reduce_size_below: 30       # F&G < 30 = fear, reduce position size
  fear_size_mult: 0.5         # half size when in fear zone

# Slack alerts
slack:
  bot_token: "${SLACK_BOT_TOKEN}"
  client_secret: "${SLACK_CLIENT_SECRET}"
  signing_secret: "${SLACK_SIGNING_SECRET}"
  war_room_enabled: true
  hive_dashboard_url: ""
  # Live feed reports (replaces dashboard)
  reports:
    pulse_interval_min: 15       # regime, vol, gates, direction bias
    health_interval_min: 60      # balances, margin, PnL, equity
    position_interval_min: 5     # unrealized PnL updates while in trade

# Claude AI trade intelligence advisor
ai:
  enabled: true
  model: opus
  pre_entry_enabled: true           # fire entry eval before placing orders
  exit_advisor_enabled: true        # fire exit eval while in trade
  regime_advisor_enabled: true      # fire regime eval on vol transitions
  skip_confidence_threshold: 0.55   # AI needs >= 55% confidence to skip entry (was 70% — too strict)
  max_score_adjustment: 10          # max points AI can add/subtract from score
  exit_tighten_on_exit_now: false   # was true -- stale AI cache causes premature decay exits
  cache_ttl_entry: 0                # always fresh for entries (0 = no expiry)
  cache_ttl_exit: 120               # recheck exit every 2 min
  cache_ttl_regime: 300             # recheck regime every 5 min
  # Executive mode: Claude makes the actual entry/exit decisions
  executive_mode: true              # Claude is the boss — overrides strategy engine
  executive_full_control: false     # advisory-only by default; deterministic risk and freshness gates stay binding
  executive_min_confidence: 0.75    # raised: need strong conviction to exit, no panic sells
  executive_allow_soft_risk_override: false
  executive_allow_no_signal_entries: false
  executive_allow_size_override: false
  executive_allow_gemini_takeover: false
  cache_ttl_directive: 60           # 60 sec — fastest reaction time when the breakout comes
  hard_min_score: 0                 # DISABLED
  # Post-loss debrief: AI deep dive during cooldown to build recovery strategy
  loss_debrief_enabled: true         # fire Claude analysis after every loss
  loss_debrief_cache_ttl: 1800       # 30 min -- stays relevant through cooldown + recovery
  # Codex peer advisor (team mode): Codex analyzes in parallel, Opus stays boss.
  codex:
    enabled: true                   # safe default: keep off until you confirm Codex login/profile
    cli_bin: codex                  # Codex CLI binary
    model: gpt-5                    # Codex model for peer analysis
    sandbox_mode: read-only         # prevents Codex exec from writing files
    timeout_sec: 60
    pre_entry_enabled: true
    exit_advisor_enabled: true
    regime_advisor_enabled: true
    executive_mode: true            # produce codex_directive in parallel with Claude directive
    cache_ttl_entry: 0
    cache_ttl_exit: 120
    cache_ttl_regime: 300
    cache_ttl_directive: 60
  # Gemini peer advisor (team member)
  gemini:
    enabled: true
    model: gemini-2.0-flash
    pre_entry_enabled: true
    exit_advisor_enabled: true
    regime_advisor_enabled: true
    executive_mode: true
    cache_ttl_entry: 0
    cache_ttl_exit: 120
    cache_ttl_regime: 300
    cache_ttl_directive: 60
  # Inter-agent communication (live debate + consensus)
  agent_comms:
    enabled: true
    challenge_round: true          # agents challenge each other's positions
    consensus_required: false      # if true, requires 2/3 agreement to enter
    exit_challenge_threshold: 0.70 # confidence needed for exit challenge
    max_debate_time_sec: 30        # timeout for challenge round
    log_debates: true              # log all debates to agent_debates.jsonl
  # Perplexity News Sentinel (Intel)
  perplexity:
    enabled: true
    # API Key loaded from .env or PERPLEXITY_API_KEY env var
    # Fallback: uses Claude 'WebSearch' tool if no key found

# Macro/market informer stream for dashboard + Slack digest.
market_intel:
  enabled: true
  refresh_seconds: 300
  timeout_sec: 3.5
  binance_symbol: XLMUSDT
  max_headlines: 24
  slack_digest_enabled: true
  slack_interval_minutes: 60
  slack_max_items: 5
  futures_relativity:
    bonus_max: 4
    min_confidence: 0.45
  weekly_research:
    enabled: true
    refresh_hours: 6
    window_refresh_hours: 2
    sunday_start_hour_et: 18
    monday_end_hour_et: 10
    score_bonus_max: 3
    min_confidence: 0.45
  liquidation_feed:
    symbol: XLMUSDT
    stale_seconds: 45
    window_seconds: 900
    reconnect_seconds: 3
    recent_event_limit: 200
    min_notional_5m_usd: 25000
    bonus_max: 2

logging:
  decisions_jsonl: logs/decisions.jsonl
  trades_csv: logs/trades.csv

paths:
  data_dir: data
  logs_dir: logs

# Regime-based trading: adapt risk/exit params to market conditions
# Uses vol_phase from expansion.py + ADX from v4_engine — no new indicators
regime_manager:
  enabled: true
  compression:
    adx_threshold: 25         # ADX below this = choppy -- SNIPER: this IS our environment
    rsi_low: 40               # RSI must be in this range for compression
    rsi_high: 60
    size_multiplier: 1.0      # SNIPER MODE: was 0.7 -- compression IS the play, full size
    max_sl_pct: 0.005         # SNIPER MODE: was 0.00 -- always have a hard stop, 0.5%
    tp_atr_mult: 2.5          # SNIPER MODE: was 0.7 -- wide targets in compression, big move coming
    time_stop_bars: 999        # DISABLED: no time exits in compression. Wait for the breakout.
    early_save_bars: 999       # SNIPER MODE: DISABLED -- hold until TP or stop, no early exits
  expansion:
    adx_threshold: 25         # ADX above this = trending
    atr_ratio_threshold: 1.15 # OR ATR ratio above this
    size_multiplier: 1.0      # SNIPER MODE: was 1.3 -- equal size across regimes, we're MR only
    max_sl_pct: 0.005         # SNIPER MODE: was 0.00 -- always have a hard stop
    tp_atr_mult: 3.0          # SNIPER MODE: was 1.2 -- wide targets even in expansion
    time_stop_bars: 999       # DISABLED: no time exits in expansion. Ride the wave.
    early_save_bars: 999      # SNIPER MODE: DISABLED -- hold until TP or stop
  # Default thresholds for transition mode (uses base config values)
  default_max_sl_pct: 0.005        # SNIPER MODE: was 0.00 -- always have the 0.5% hard stop
  default_tp_atr_mult: 2.5         # SNIPER MODE: was 1.0 -- wide TP targets across all regimes
  default_time_stop_bars: 999   # DISABLED: no time exits. Only TP, SL, or structure break.
  default_early_save_bars: 999  # SNIPER MODE: DISABLED -- no early saves, hold until TP or stop

# Fib Retrace Engine: countertrend entries at fib retracement levels
fib_retrace:
  enabled: true
  min_swing_pct: 0.03
  lookback_bars_1h: 48
  swing_left: 3
  swing_right: 3
  retrace_depth_max: 0.35
  min_confirmations: 2
  min_rr_ratio: 1.5
  sl_atr_buffer_mult: 0.3

# Slow Bleed Hunter — catches gradual directional grinds
slow_bleed_hunter:
  enabled: true
  min_consecutive_bars: 3       # 3+ lower-highs + lower-lows (or inverse)
  ema_period: 20                # EMA-20 for direction confirmation
  rsi_min: 30                   # RSI floor (avoid oversold bounces)
  rsi_max: 65                   # RSI ceiling (avoid overbought fades)
  volume_min_ratio: 0.8         # volume >= 80% of 10-bar avg (alive but not spiking)
  body_consistency_max: 2.5     # max body size ratio (bleed = steady, not wild)
  min_confirmations: 2          # need 2+ confluence beyond consecutive bars

# HTF Trend Bias Filter
# When the 1h trend is clearly bearish (crash), block new longs unless the
# entry type is a confirmed capitulation reversal signal.
# Symmetric logic applies to shorts in a bullish expansion.
# Uses classify_htf_trend_bias() from strategy/regime_manager.py.
htf_direction_filter:
  enabled: true

  # bearish_crash: RSI_1h < 30 + price below EMA21 + EMA21 below EMA55 + slope negative
  # In this state, ONLY these entry types are allowed for longs:
  capitulation_entry_types:
    - reversal_impulse       # strong reversal candle + structure
    - wick_rejection         # long wick off support with volume
    - volume_climax_reversal # climactic selling exhaustion
    - fib_retrace            # bounce from measured fib level

  # Asymmetric sizing applied on top of all other multipliers.
  # bearish_crash: longs get 0.4x (minimal), shorts get 1.2x (full conviction)
  # bearish_trend: longs get 0.7x (cautious), shorts get 1.1x (slight edge)
  # neutral: 1.0x both directions
  # bullish_trend: longs 1.1x, shorts 0.7x
  # bullish_expansion: longs 1.2x, shorts 0.4x (only reversals allowed)
  # (These are baked into classify_htf_trend_bias() return values.
  #  Set enabled: false to disable the filter and revert to symmetric sizing.)

# Rolling expectancy gate: kill switch when bot is running cold
rolling_expectancy:
  enabled: true
  lookback: 20                    # rolling window of last 20 closed trades
  min_trades: 10                  # don't activate until 10+ trades exist
  min_win_rate: 0.25              # block below 25% win rate
  reduce_win_rate: 0.35           # reduce size below 35% win rate
  reduce_size_mult: 0.5           # half size when in warning zone
  min_ev_usd: -3.0                # block when avg trade loses more than $3
  min_profit_factor: 0.5          # block when profit factor below 0.5
  max_tail_losses: 5              # block after 5 consecutive losses at tail
  promotion_min_size_mult: 1.15   # only promote size when realized edge is materially strong
  promotion_cap: 1.5              # never let expectancy promotion outrun the rest of the caps
  reduction_floor: 0.25           # keep some floor for size reductions before a hard kill-switch

# Market pulse: composite health scoring (fuses sentiment + news + live tick)
market_pulse:
  enabled: true
  cache_ttl_sec: 300              # recompute every 5 min
  danger_block_entries: true      # danger regime is now a hard stop for new entries
  danger_threshold: 20            # health < 20 = danger zone
  risk_off_size_mult: 0.7         # 30% smaller positions in risk_off
  notify_regime_change: true      # Slack alert on regime transitions

freshness_gates:
  enabled: true
  max_live_tick_age_sec: 60
  max_market_brief_age_min: 45
  block_on_dead_tick: true
  block_on_stale_market_brief: true
  block_on_sentiment_stale_in_danger: true
  block_on_pulse_danger: true

# ============================================================================
# SNIPER MODE -- Active since 2026-03-22
# ============================================================================
# Strategy: Mean reversion at 24h range extremes with wide targets and patience.
# Based on XLM move analysis showing:
#   - 50% resistance rejections (sell the rip), 45% support bounces (buy the dip)
#   - Big moves are slow swings lasting 10-17 hours
#   - Best hours: 9-10 PM PT (biggest avg), 6-8 AM PT (most volume)
#   - Top 10 realistic moves = ~$109/month at $500 account
#   - Scalping small wiggles bleeds fees/losses
#
# Core principles:
#   1. Only trade at extremes of 24h range (RSI <25 for longs, >75 for shorts)
#   2. Mean reversion only (regime_mode: mr_only)
#   3. Wide TP targets (2.5-3x ATR) -- let the swing develop
#   4. Hold 4-12+ hours minimum (time_stop_bars: 48 = 12 hours)
#   5. Max 2 trades per day (only the absolute best)
#   6. Hard stop at 0.5% ($2.50 max loss per trade)
#   7. No reversal signal exits for 12 hours minimum
#   8. No reverse-on-exit (each trade is deliberate)
#   9. 1 contract only (max_contracts_hard_cap: 1)
#   10. No averaging down (PLRL3 disabled)
#   11. No recovery mode (1 loss = done for day)
#   12. All lane thresholds raised 10-15 points for extreme selectivity
#   13. R:R floor raised to 3:1 (was 2:1) -- only asymmetric bets
#   14. EV minimum raised to $3 (was $2) -- no crumb hunting
#
# To revert: search "SNIPER MODE" in this file and restore previous values.
# Previous values are documented in each comment.
# ============================================================================
sniper_mode:
  enabled: true
  activated: "2026-03-22"
  description: "Mean reversion at range extremes, wide targets, max patience"
  # Entry filters (read by AI executive + scoring engine)
  entry_filters:
    rsi_oversold_max: 25           # longs only when RSI < 25 (extreme oversold)
    rsi_overbought_min: 75         # shorts only when RSI > 75 (extreme overbought)
    range_proximity_pct: 0.005     # price must be within 0.5% of 24h high (shorts) or low (longs)
    require_bb_squeeze: true       # only enter when Bollinger Bands are tight (compression precedes move)
    bb_squeeze_percentile: 20      # BB width must be in bottom 20th percentile (tightest 20% of readings)
  # Hold parameters
  hold:
    min_hold_hours: 4              # absolute minimum 4 hours before any exit (except hard stop)
    target_hold_hours: 12          # target hold for full swing capture
    max_hold_hours: 18             # cut at 18 hours if nothing happened
  # Risk
  risk_per_trade:
    max_loss_usd: 2.50             # hard ceiling on loss per trade
    max_loss_pct: 0.005            # 0.5% of account
    contracts: 1                   # always 1 contract
  # Targets
  targets:
    tp_atr_mult: 3.0               # 3x ATR take profit
    min_tp_pct: 0.005              # minimum 0.5% move to TP
  # Scheduling
  schedule:
    max_trades_per_day: 2
    preferred_hours_pt: [21, 22, 6, 7, 8]  # 9-10 PM PT (biggest), 6-8 AM PT (most volume)
    cooldown_between_trades_min: 60

# Reversal Engine (30 strategies from strategy/reversal_engine.py)
reversal_engine:
  enabled: true
  # Score modifier capped at +/-15 pts

# Weekend Mode: reduce risk on Saturday/Sunday
weekend_mode:
  enabled: true
  size_mult: 0.5           # half size on weekends
  be_buffer_mult: 1.5      # 50% wider break-even buffer

# Time-based Stop Tightening: kill zombie trades
# If trade hasn't moved 0.5 ATR in 2 hours, tighten break-even trigger
exits:
  time_tighten_bars: 8           # 2 hours (8 x 15min bars)
  time_tighten_min_move_atr: 0.5 # must have moved at least 0.5 ATR
  time_tighten_be_atr: 1.0       # tighten BE trigger to 1.0 ATR

# Volume Profile (POC/VAH/VAL)
volume_profile:
  enabled: true
  lookback_hours: 4         # session profile lookback
  num_bins: 30              # price level bins
  poc_score_neutral: 0      # at POC = no edge
  discount_score_long: 8    # below VAL = long bias
  premium_score_short: 8    # above VAH = short bias

# Cumulative Volume Delta
cvd:
  enabled: true
  divergence_lookback: 20
  divergence_score: 8       # +/- points on divergence
  absorption_window: 5

# Liquidity Pools (equal highs/lows)
liquidity_pools:
  enabled: true
  tolerance_pct: 0.001
  min_touches: 2
  proximity_atr: 1.5        # within 1.5 ATR = approaching pool
  sweep_score: 10            # confirmed stop hunt = +10

# Wyckoff Phase Detection
wyckoff:
  enabled: true
  lookback_bars: 96          # 24 hours of 15m bars
  accumulation_score_long: 8
  distribution_score_short: 8
  spring_score: 12           # spring/upthrust = high conviction

# Premium/Discount Zone Filter
premium_discount:
  enabled: true
  long_only_below_pct: 0.50  # only long below 50% of range
  short_only_above_pct: 0.50 # only short above 50% of range
  score_bonus: 6             # +6 when in correct zone

# Weekly Chart Bias
weekly_bias:
  enabled: true
  # Uses weekly EMA21 slope + RSI to determine macro direction
  # long_only in weekly uptrend, short_only in weekly downtrend, both in neutral

# Pattern Failure Trades
pattern_failure:
  enabled: true
  score_bonus: 12            # failed patterns are high conviction signals
