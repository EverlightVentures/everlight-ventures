    lane_o_enabled: true           # exhaustion warning blocker
    lane_o_rsi_extreme: 75         # RSI threshold for exhaustion detection
    # Lane P: Grid Range (grid-bot-style mean-reversion at S/R edges)
    lane_p_enabled: true
    lane_p_threshold: 35           # low threshold - range edges are high probability
    # Lane Q: Funding Arb Bias - trade direction that earns funding payments
    lane_q_enabled: true
    lane_q_threshold: 60           # moderate threshold - funding signal needs quality confluence
    funding_arb_threshold: 0.0001  # min |funding_rate| to trigger (0.01%)
    # Lane R: Regime Low Vol - BB squeeze + range edge scalps in dead markets
    lane_r_enabled: true
    lane_r_threshold: 55           # moderate - squeeze setups are reliable
    # Lane S: Stat Arb Proxy - z-score mean reversion (>2 sigma deviation)
    lane_s_enabled: true
    lane_s_threshold: 50           # moderate - statistical edge is strong at 2+ sigma
    # Lane T: Orderflow Imbalance - volume delta proxy (buy/sell ratio >2:1)
    lane_t_enabled: true
    lane_t_threshold: 65           # higher threshold - proxy signal needs extra confluence
    # Lane U: Macro MA Cross - 200 MA breakout on 1h with 4h confirmation
    lane_u_enabled: true
