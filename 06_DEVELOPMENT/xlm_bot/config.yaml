    min_ev_usd: 0.25
  adaptive_threshold:
    enabled: true           # self-learning: auto-raise thresholds for losing score buckets
    min_sample_size: 5
    lookback_trades: 30
    target_win_rate: 0.50
  short_bias_atr_override:
    enabled: false
    require_direction: both
    require_regime: trend
    require_entry_type: pullback
    min_score: 80
    min_adx_15m: 30
    require_atr_expanding: true
    require_bb_expanding: true
    min_ev_usd: 0.25
    allow_score_override: true
    score_override_only_ema_bias_fail: true
    score_override_min_score: 80
  # Dip-retrace no-short gate: blocks shorts when price is bouncing back
  # Prevents the classic "short the retrace after the dump" mistake
  dip_retrace_gate:
    enabled: true
    rsi_rising_bars: 3            # RSI must be rising for 3+ bars to detect bounce
    vwap_reclaim_pct: 0.002       # price within 0.2% of or above VWAP = reclaimed
    min_higher_closes: 2          # 2+ consecutive higher closes = bounce confirmed
    block_direction: short        # only block shorts during bounce (longs always allowed)
    exempt_tiers: [MONSTER]       # MONSTER tier can still short (very high conviction)
    exempt_entry_types:           # these entry types are exempt from the gate
      - reversal_impulse          # reversals are designed for counter-trend
      - volume_climax_reversal    # climax reversals trade after capitulation

  # Top chart pattern recognition gates (Feb 28)
  # Block entries that fight confirmed high-probability patterns
  pattern_gates:
    enabled: true
    # Inverse H&S: block shorts when neckline breaks up (84% success)
    inv_hs_block_shorts: true
    # H&S: block longs when neckline breaks down (82% success)
    hs_block_longs: true
    # Double bottom: block shorts near second bounce (82% success)
    double_bottom_block_shorts: true
    # Channel: only trade in channel direction
    channel_direction_only: true

  moonshot:
