<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ name }}</title>
    <style>
      body { margin: 0; background: #0b0f1a; color: #e8f3ff; font-family: "Space Grotesk", sans-serif; }
      .wrap { padding: 18px; }
      .title { font-size: 16px; margin-bottom: 12px; }
      .frame { width: 100%; height: 92vh; border: none; border-radius: 12px; background: #0f1424; }
      img, video, audio { width: 100%; border-radius: 12px; }
      pre { background: #0f1424; padding: 12px; border-radius: 12px; overflow: auto; }
      a { color: #40cfff; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">{{ name }}</div>
      {% if kind == "image" %}
        <img src="{{ url }}" alt="{{ name }}" />
      {% elif kind == "video" %}
        <video controls>
          <source src="{{ url }}" type="{{ mime }}" />
        </video>
      {% elif kind == "audio" %}
        <audio controls>
          <source src="{{ url }}" type="{{ mime }}" />
        </audio>
      {% elif kind == "pdf" %}
        <iframe class="frame" src="{{ url }}"></iframe>
      {% elif kind == "text" %}
        <pre>{{ text }}</pre>
      {% else %}
        <p>Preview not available. <a href="{{ url }}" target="_blank">Open raw</a></p>
      {% endif %}
    </div>
  </body>
</html>
