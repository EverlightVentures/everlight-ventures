    lane_v_min_signals: 4          # minimum core signals to fire
    lane_v_wick_min_ratio: 0.35    # minimum wick-to-range ratio
    lane_v_wick_strong_ratio: 0.50 # strong wick threshold
    lane_v_cluster_zone_atr: 0.25  # cluster zone width in ATR multiples
    lane_v_sweep_cooldown_bars: 3  # min bars between sweep trades
    lane_v_continuation_enabled: true   # allow pre-sweep continuation trades
    lane_v_reversal_enabled: true       # allow post-sweep reversal trades
    lane_v_wick_score_min: 55
    lane_v_max_reversal_chase_atr: 1.2
    lane_v_continuation_tp_buffer_atr: 0.15
    lane_v_reversal_tp_mode: fast_mean_reversion
    lane_v_fail_fast_bars: 3
    lane_v_skip_balanced_clusters: true
    lane_v_min_cluster_strength: 30
    lane_v_require_volume_spike_for_reversal: false
    lane_v_require_fib_or_ema_stretch: true
    compression_breakout_enabled: true
    early_impulse_enabled: true
    early_impulse_body_mult: 1.5     # was 2.0 — catch more impulse moves
    early_impulse_vol_mult: 1.2      # was 1.5 — more opportunity in low-vol
    early_impulse_close_pct: 0.75
    squeeze_impulse_body_ratio: 0.6
